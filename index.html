<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="/src/style.css">
  <title>Kurser - DT208G 1</title>
</head>

<body>
  <div id="app">

    <h1>Kurser</h1>

    <form id="course-form">
      <!-- allt required så inget får saknas -->
      <input id="code" placeholder="Kurskod" required />
      <input id="name" placeholder="Kursnamn" required />

      <select id="progression" required>
        <option value="" disabled selected>Välj progression</option>
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
      </select>

      <input id="syllabus" placeholder="URL till kursplan" required />
      <button type="submit">Lägg till kurs</button>
    </form>

    <div id="course-list"></div>

  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
